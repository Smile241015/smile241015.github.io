<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bubble Official Merch</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f9f9f9;
            color: #333;
        }
        header {
            background-color: #111;
            color: white;
            text-align: center;
            padding: 40px 20px;
        }
        header h1 {
            margin: 0;
            font-size: 2.5em;
            letter-spacing: 2px;
        }
        header p {
            margin: 10px 0 0 0;
            color: #bbb;
        }
        .container {
            max-width: 1200px;
            margin: 40px auto;
            padding: 0 20px;
        }
        .products-grid {
            display: flex;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
        }
        .product-card {
            background: white;
            border: 1px solid #eee;
            border-radius: 8px;
            text-align: center;
            padding: 20px;
            width: 280px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }
        .product-card img {
            max-width: 100%;
            height: auto;
            border-radius: 4px;
        }
        .product-title {
            font-size: 1.2em;
            margin: 15px 0 5px 0;
            font-weight: bold;
        }
        .product-price {
            color: #e67e22;
            font-size: 1.3em;
            font-weight: bold;
            margin-bottom: 15px;
        }
        .buy-btn {
            display: inline-block;
            background-color: #111;
            color: white;
            text-decoration: none;
            padding: 10px 20px;
            border-radius: 4px;
            font-weight: bold;
            transition: background 0.3s;
        }
        .buy-btn:hover {
            background-color: #e67e22;
        }
        footer {
            text-align: center;
            padding: 30px;
            background-color: #111;
            color: #666;
            margin-top: 50px;
            font-size: 0.9em;
        }
    </style>
</head>
<body>

    <header>
        <h1>BUBBLE OFFICIAL SHOP</h1>
        <p>Το επίσημο merch του καναλιού</p>
    </header>

    <div class="container">
        <div class="products-grid">
            
            <!-- ΠΡΟΪΟΝ 1 -->
            <div class="product-card">
                <img src="https://via.placeholder.com/350x400.png?text=Official+T-Shirt" alt="Merch T-Shirt">
                <div class="product-title">Official T-Shirt</div>
                <div class="product-price">24.99€</div>
                <a href="#" class="buy-btn">ΑΓΟΡΑ ΤΩΡΑ</a>
            </div>

            <!-- ΠΡΟΪΟΝ 2 -->
            <div class="product-card">
                <img src="https://via.placeholder.com/350x400.png?text=Official+Hoodie" alt="Merch Hoodie">
                <div class="product-title">Official Hoodie</div>
                <div class="product-price">44.99€</div>
                <a href="#" class="buy-btn">ΑΓΟΡΑ ΤΩΡΑ</a>
            </div>

            <!-- ΠΡΟΪΟΝ 3 -->
            <div class="product-card">
                <img src="https://via.placeholder.com/350x400.png?text=Official+Cap" alt="Merch Cap">
                <div class="product-title">Official Cap</div>
                <div class="product-price">19.99€</div>
                <a href="#" class="buy-btn">ΑΓΟΡΑ ΤΩΡΑ</a>
            </div>

        </div>
    </div>

    <footer>
        <p>&copy; 2026 Bubble Shop. All rights reserved.</p>
    </footer>

</body>
</html>
